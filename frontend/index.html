<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2d1b12">
  <title>故乡来信 · Hometown Letters</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="workbench">
  <div class="room-backdrop" aria-hidden="true"></div>
  <div class="paper-overlay" aria-hidden="true"></div>

  <div id="auth-gate">
    <div class="page active" id="page-auth"></div>
  </div>

  <div id="app" class="workbench-shell">
    <aside class="side-rail" aria-label="故乡来信主导航">
      <button class="rail-brand" onclick="App.navigate('game')" title="回到桌面">
        <span class="brand-mark">乡</span>
        <span class="brand-copy"><strong>故乡来信</strong><small>Hometown Letters</small></span>
      </button>
      <nav class="rail-nav" aria-label="页面导航">
        <button class="rail-item nav-btn" data-page="game" onclick="App.navigate('game')">
          <img src="assets/icons/icon_mailbox.png" alt=""><span>桌面</span>
        </button>
        <button class="rail-item nav-btn" data-page="write_letter" onclick="App.navigate('write_letter')">
          <img src="assets/letters/env_letter_paper.png" alt=""><span>写信</span>
        </button>
        <button class="rail-item nav-btn" data-page="postcards" onclick="App.navigate('postcards')">
          <img src="assets/icons/icon_postcards.png" alt=""><span>明信片</span>
        </button>
        <button class="rail-item nav-btn" data-page="discover" onclick="App.navigate('discover')">
          <img src="assets/icons/icon_settings.png" alt=""><span>发现</span>
        </button>
        <button class="rail-item nav-btn" data-page="mailbox" onclick="App.navigate('mailbox')">
          <img src="assets/icons/icon_mailbox.png" alt=""><span>信箱</span>
        </button>
        <button class="rail-item nav-btn" data-page="memories" onclick="App.navigate('memories')">
          <img src="assets/icons/icon_memory.png" alt=""><span>记忆</span>
        </button>
        <button class="rail-item nav-btn" data-page="settings" onclick="App.navigate('settings')">
          <img src="assets/icons/icon_settings.png" alt=""><span>设置</span>
        </button>
      </nav>
      <div class="rail-note" aria-hidden="true"><span>愿每一次回望</span><span>都有灯亮着</span></div>
    </aside>

    <main class="workspace">
      <header class="workspace-topbar">
        <div class="workspace-heading">
          <div class="workspace-eyebrow" id="workspace-eyebrow">DESKTOP · 暖灯已亮</div>
          <h1 id="workspace-title">桌上的来信</h1>
          <p id="workspace-subtitle">把今天轻轻放下，也听一听过去的回声。</p>
        </div>
        <div class="workspace-status" aria-label="当前旅程状态">
          <div><span>旅程</span><strong id="shell-day">第 0 天</strong></div>
          <div><span>故乡</span><strong id="shell-hometown">尚未设置</strong></div>
        </div>
      </header>

      <div class="content" id="workspace-content">
        <div class="page active" id="page-game"></div>
        <div class="page" id="page-write_letter"></div>
        <div class="page page-w" id="page-postcards"></div>
        <div class="page page-w" id="page-discover"></div>
        <div class="page" id="page-mailbox"></div>
        <div class="page" id="page-memories"></div>
        <div class="page page-w" id="page-settings"></div>
      </div>
    </main>
  </div>

  <div class="toast-c" id="toast-container" aria-live="polite"></div>

  <!-- 关键路径：先加载 auth/api/app -->
  <script src="js/core/auth.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/app.js"></script>
  <!-- 页面渲染函数，defer 不阻塞 -->
  <script src="js/pages/auth.js" defer></script>
  <script src="js/pages/game.js" defer></script>
  <script src="js/pages/write-letter.js" defer></script>
  <script src="js/pages/postcards.js" defer></script>
  <script src="js/pages/discover.js" defer></script>
  <script src="js/pages/mailbox.js" defer></script>
  <script src="js/pages/memories.js" defer></script>
  <script src="js/pages/settings.js" defer></script>
  <script src="js/ui/workbench.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.isLoggedIn()) {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('app').style.display = 'grid';
        App.init();
        // 背景图延迟加载，不阻塞首屏
        requestAnimationFrame(() => {
          setTimeout(() => {
            document.querySelector('.room-backdrop')?.classList.add('loaded');
          }, 100);
        });
      } else {
        document.getElementById('auth-gate').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        renderAuthPage('login');
      }
    });
  </script>
</body>
</html>
